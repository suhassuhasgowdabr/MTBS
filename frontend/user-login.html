<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Login | Movie Booking System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Movie Booking System</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="movies.html">Movies</a>
          <a class="nav-link" href="booking.html">Book Tickets</a>
          <a class="nav-link active" href="user-login.html">User Login</a>
          <a class="nav-link" href="register.html">Register</a>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="card mx-auto confirmation-card">
        <div class="card-body">
          <h3 class="mb-3">User Login</h3>
          <div id="userLoginAlert"></div>
          <form id="userLoginForm" class="row g-3">
            <div class="col-12">
              <label class="form-label">Email</label>
              <input class="form-control" type="email" name="email" required />
            </div>
            <div class="col-12">
              <label class="form-label">Password</label>
              <input class="form-control" type="password" name="password" required />
              <div class="text-end mt-1">
                <a href="forgot-password.html" class="small text-decoration-none">Forgot Password?</a>
              </div>
            </div>
            <div class="col-12">
              <button class="btn btn-primary w-100" type="submit">Login as User</button>
            </div>
          </form>
          <p class="mt-3 mb-0 text-muted">
            New user? <a href="register.html">Create an account</a>
          </p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
