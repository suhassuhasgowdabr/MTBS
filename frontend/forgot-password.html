<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Movie Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">🎬 Movie Booking System</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="user-login.html">Login</a>
        </div>
      </div>
    </nav>
    <div class="container py-5">
      <div class="card mx-auto" style="max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border:none; border-radius: 12px;">
        <div class="card-body p-4">
          <h3 class="mb-3 text-center fw-bold">Reset Password</h3>
          <div id="forgotPasswordAlert"></div>
          
          <form id="requestCodeForm" class="row g-3">
            <p class="text-muted small mb-0">Enter your email address to receive a validation code.</p>
            <div class="col-12 mt-2">
              <label class="form-label">Email Address</label>
              <input class="form-control" type="email" name="email" id="reqEmail" required />
            </div>
            <div class="col-12">
              <button class="btn btn-primary w-100 mt-2 py-2" type="submit">Send Reset Code</button>
            </div>
          </form>

          <form id="resetPasswordForm" class="row g-3 d-none mt-1">
            <p class="text-muted small mb-0">Enter the code we sent via alert and your new password.</p>
            <div class="col-12 mt-2">
              <label class="form-label">Reset Code</label>
              <input class="form-control" type="text" name="code" required />
            </div>
            <div class="col-12">
              <label class="form-label">New Password</label>
              <input class="form-control" type="password" name="newPassword" required minlength="6" />
            </div>
            <div class="col-12">
              <button class="btn btn-success w-100 mt-2 py-2" type="submit">Update Password</button>
            </div>
          </form>

          <p class="mt-4 mb-0 text-center text-muted">
            <a href="user-login.html" class="text-decoration-none text-secondary">Back to Login</a>
          </p>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
