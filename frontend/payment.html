<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment | Movie Booking System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Movie Booking System</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="movies.html">Movies</a>
          <a class="nav-link" href="booking.html">Book Tickets</a>
          <a class="nav-link" href="login.html">Login</a>
          <a class="nav-link" href="register.html">Register</a>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <h2 class="mb-3">Complete Payment</h2>
      <div id="paymentAlert"></div>

      <div class="row g-4">
        <div class="col-lg-5">
          <div class="card h-100">
            <div class="card-body" id="paymentBookingDetails">
              <h5 class="card-title">Booking Summary</h5>
              <p class="text-muted mb-0">Loading booking details...</p>
            </div>
          </div>
        </div>
        <div class="col-lg-7">
          <div class="card h-100">
            <div class="card-body text-center">
              <h5 class="card-title mb-3">Payment QR Code</h5>
              <p class="text-muted small mb-3">Scan QR to complete payment</p>
              <div style="background: #f8f9fa; padding: 20px; border-radius: 8px; min-height: 350px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <img
                  id="providedQrImage"
                  class="payment-qr-image mb-3"
                  src="assets/qr.jpeg"
                  alt="Payment QR Code"
                  style="height: 320px; display: none;"
                />
                <div id="qrLoadingPlaceholder" style="width: 320px; height: 320px; background: white; border: 2px dashed #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #999;">
                  <div>Loading QR...</div>
                </div>
              </div>
              <p id="upiText" class="small text-muted mt-3 mb-0"></p>
              <div class="mt-4">
                <label for="utrNumber" class="form-label">UTR Number (Transaction Reference)</label>
                <input 
                  type="text" 
                  class="form-control" 
                  id="utrNumber" 
                  placeholder="Enter UTR/Transaction ID"
                  maxlength="50"
                />
              </div>
              <button id="markPaidBtn" class="btn btn-primary mt-3">I Have Paid</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js?v=20260307"></script>
  </body>
</html>
