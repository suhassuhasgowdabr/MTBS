<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Tickets | Movie Booking System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Movie Booking System</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="movies.html">Movies</a>
          <a class="nav-link active" href="booking.html">Book Tickets</a>
          <a class="nav-link" href="user-login.html">User Login</a>
          <a class="nav-link" href="admin-login.html">Admin Login</a>
          <a class="nav-link" href="register.html">Register</a>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <h2 class="mb-3">Book Your Ticket</h2>
      <div id="bookingAlert"></div>

      <div class="row g-4">
        <div class="col-lg-5">
          <div class="card">
            <div class="card-body">
              <form id="bookingForm" class="row g-3">
                <div class="col-12">
                  <label class="form-label">Movie</label>
                  <select id="bookingMovieSelect" class="form-select" required></select>
                </div>
                <div class="col-12">
                  <label class="form-label">Show Timing</label>
                  <select id="bookingShowSelect" class="form-select" required></select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Your Name</label>
                  <input class="form-control" name="customerName" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Email</label>
                  <input class="form-control" type="email" name="customerEmail" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Number of Seats</label>
                  <input
                    id="seatCountInput"
                    class="form-control"
                    type="number"
                    name="seatCount"
                    value="1"
                    min="1"
                    required
                  />
                </div>
                <div class="col-12">
                  <div class="d-flex justify-content-between">
                    <small class="text-muted">Selected Seats:</small>
                    <small id="selectedSeatsText" class="fw-semibold">None</small>
                  </div>
                </div>
                <div class="col-12">
                  <button class="btn btn-primary w-100" type="submit">Confirm Booking</button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-7">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Seat Selection</h5>
              <p class="text-muted small mb-3">
                Select seats equal to seat count. Gray seats are already booked.
              </p>
              <div id="seatGrid" class="seat-grid"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
